<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheets Chat - RAG</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f4f4f4; }
        #chat { max-width: 800px; margin: 0 auto; background: white; border-radius: 10px; padding: 20px; height: 80vh; display: flex; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 10px; border: 1px solid #ddd; margin-bottom: 10px; }
        .message { margin: 10px 0; padding: 10px; border-radius: 8px; }
        .user { background: #e3f2fd; text-align: right; }
        .ai { background: #f0f0f0; }
        input { width: 100%; padding: 12px; font-size: 16px; }
        button { padding: 12px 20px; font-size: 16px; }
    </style>
</head>
<body>
    <div id="chat">
        <h1>📊 Sheets Chat</h1>
        <div id="messages"></div>
        <div>
            <input type="text" id="userInput" placeholder="Ask about your sheets..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const input = document.getElementById('userInput');

        async function sendMessage() {
            const question = input.value.trim();
            if (!question) return;

            addMessage('user', question);
            input.value = '';

            const response = await fetch('YOUR_WORKER_URL_HERE', {  // We will replace this later
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: question })
            });

            const data = await response.text();
            addMessage('ai', data || 'Sorry, I could not get a response.');
        }

        function addMessage(sender, text) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.textContent = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    </script>
</body>
</html>
